<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Horse Racing Predictor</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body x-data="horseApp()">

  <!-- Offline banner -->
  <div x-show="!online" x-cloak class="offline-banner">Offline</div>

  <!-- Error banner (shared across screens) -->
  <div x-show="error" x-cloak class="error-banner">
    <span class="error-msg" x-text="error"></span>
    <div class="error-actions">
      <button @click="clearError()">Dismiss</button>
    </div>
  </div>

  <!-- Warning banner (shared across screens) -->
  <div x-show="warning" x-cloak class="warning-banner">
    <span class="warning-msg" x-text="warning"></span>
    <div class="warning-actions">
      <button @click="warning = null">Dismiss</button>
    </div>
  </div>

  <!-- ==================== SCREEN 1: Race List ==================== -->
  <div x-show="screen === 'list'">
    <h1>Races</h1>

    <div x-show="loading" class="loading">Loading races...</div>

    <div x-show="!loading && races.length === 0" class="empty">
      No races loaded yet.<br>Create races via the API.
    </div>

    <template x-for="group in groupRaces(races)" :key="group.key">
      <div class="race-group">
        <div class="race-group-header" x-text="group.label"></div>
        <template x-for="race in group.races" :key="race.race_id">
          <div class="race-card" @click="selectRace(race.race_id)">
            <div class="race-card-title-row">
              <span class="race-card-title" x-text="'Race ' + race.race_number"></span>
              <span class="race-card-post-time" x-show="race.post_time" x-text="race.post_time"></span>
            </div>
            <div class="race-card-meta" x-text="raceMetaStr(race)"></div>
          </div>
        </template>
      </div>
    </template>
  </div>

  <!-- ==================== SCREEN 2: Race Detail / Odds Entry ==================== -->
  <div x-show="screen === 'detail'">
    <div class="detail-header">
      <button class="back-btn" @click="backToList()">&larr; Races</button>
      <button class="refresh-odds-btn"
              @click="refreshLiveOdds()"
              :disabled="refreshingOdds || loading"
              x-text="refreshingOdds ? '…' : '↻ Live odds'">
      </button>
    </div>

    <h2>
      <span x-text="'Race ' + currentRace?.race_number"></span>
      <span class="race-header-meta"
            x-text="currentRace ? raceMetaStr(currentRace) : ''">
      </span>
    </h2>

    <div class="odds-fetched-at" x-show="lastOddsFetchAt" x-cloak
         x-text="'Live odds updated ' + fmtFetchedAt()"></div>

    <template x-for="runner in currentRace?.runners" :key="runner.post_position">
      <div class="runner-row" :class="{ scratched: runner.scratched }">
        <div class="runner-pp" x-text="runner.post_position"></div>
        <div>
          <div class="runner-name" x-text="runner.horse_name"></div>
          <div class="runner-info">
            ML <span x-text="fmtOdds(runner.morning_line_odds)"></span>-1
            <template x-if="runner.speed_fig_L1 != null">
              <span>&middot; SPD <span x-text="runner.speed_fig_L1"></span></span>
            </template>
          </div>
        </div>
        <input class="odds-input"
               type="number"
               inputmode="decimal"
               step="any"
               min="0.1"
               x-model.number="runner.live_odds"
               :disabled="runner.scratched"
               placeholder="odds">
        <button class="scratch-btn"
                :class="{ 'is-scratched': runner.scratched }"
                @click="toggleScratch(runner)">
          SCR
        </button>
      </div>
    </template>

    <button class="primary-btn" @click="submitOdds()" :disabled="loading"
            x-text="loading ? 'Loading...' : 'Get Predictions'">
    </button>
  </div>

  <!-- ==================== SCREEN 3: Predictions ==================== -->
  <div x-show="screen === 'predictions'">
    <button class="back-btn" @click="backToDetail()">&larr; Edit Odds</button>

    <h2>
      <span>Predictions</span>
      <span style="font-weight: 400; font-size: 16px; color: var(--text-secondary);"
            x-text="currentRace ? 'Race ' + currentRace.race_number : ''">
      </span>
    </h2>

    <template x-for="(pred, i) in predictions?.predictions" :key="pred.post_position">
      <div class="prediction-card" :class="{ 'top-pick': i < 2 && pred.ev_per_dollar > 0 }">
        <div>
          <span class="bet-badge"
                :class="pred.ev_per_dollar > 0 ? 'bet' : 'skip'"
                x-text="pred.ev_per_dollar > 0 ? 'BET' : 'SKIP'">
          </span>
        </div>
        <div>
          <div class="pred-name">
            <span x-text="'#' + pred.post_position"></span>
            <span x-text="pred.horse_name"></span>
          </div>
          <div class="pred-stats">
            Model <span x-text="fmtProb(pred.model_prob)"></span>
            &middot; Market <span x-text="fmtProb(pred.market_prob)"></span>
            &middot; Edge <span x-text="fmtProb(pred.edge)"></span>
          </div>
        </div>
        <div class="pred-ev" :class="pred.ev_per_dollar > 0 ? 'positive' : 'negative'">
          <div class="pred-ev-label">EV</div>
          <div class="pred-ev-value" x-text="fmtEv(pred.ev_per_dollar)"></div>
        </div>
      </div>
    </template>
  </div>

</body>
</html>
